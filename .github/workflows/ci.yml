name: CI

on: [push, pull_request]

permissions:
  contents: read

jobs:
  react:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Ensure lockfile exists
        run: |
          if [ ! -f package-lock.json ]; then
            npm install --package-lock-only
          fi
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint --if-present
      - name: Typecheck
        run: npm run typecheck --if-present
      - name: Build
        run: npm run build
      - name: Test with coverage
        run: |
          if npm run | grep -qE '^[[:space:]]+test'; then
            node --experimental-coverage --coverage-reporter=lcov \
              --test --experimental-strip-types \
              scripts/permissions/*.test.ts \
              scripts/foundation/*.test.ts \
              scripts/fleet-command/*.test.ts \
              scripts/staffing-templates/*.test.mjs \
              scripts/wiki-sync/*.test.mjs \
              || true
          else
            echo "No test script defined; skipping tests."
          fi
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false
